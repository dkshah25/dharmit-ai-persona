services:
  # Backend Service
  - type: web
    name: dharmit-ai-persona-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
        placeholder: "Enter your Groq API Key (Llama 3.1 & 3.3 models)"
      - key: OPENAI_API_KEY
        sync: false
        placeholder: "Optional: Enter OpenAI API Key"
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Optional: Enter Google Gemini API Key"
      - key: GITHUB_TOKEN
        sync: false
        placeholder: "Optional: Enter GitHub Token (for ingestion)"
      - key: VAPI_API_KEY
        sync: false
        placeholder: "Optional: Enter Vapi API Key"
      - key: VAPI_ASSISTANT_ID
        sync: false
        placeholder: "Optional: Enter Vapi Assistant ID"
      - key: CAL_API_KEY
        sync: false
        placeholder: "Optional: Enter Cal.com API Key"
      - key: CAL_EVENT_TYPE_ID
        sync: false
        placeholder: "Optional: Enter Cal.com Event Type ID"
